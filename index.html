<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>NIT Meghalaya Hostel Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="login.css">
</head>
<body>

  <div class="login-card">
    <img src="logo.jpeg" class="nit-logo" alt="NIT Meghalaya Logo">
    <h1 class="portal-title">NIT Meghalaya</h1>
    <h2 class="portal-subtitle" style="text-align:center;margin:6px 0 16px;color:#666">Hostel Mess Portal</h2>

    <div class="selection-box">
      <label>Select User Type</label>
      <select id="userType" class="input">
        <option value="">-- Select --</option>
        <option value="student">Student</option>
        <option value="staff">Staff</option>
        <option value="admin">Admin</option>
      </select>
    </div>

    <div id="studentInput" class="selection-box hidden">
      <label>Enter Roll Number</label>
      <input type="text" id="rollInput" placeholder="Format: 23CS123" class="input">
    </div>

    <div id="staffInput" class="selection-box hidden">
      <label>Enter Name</label>
      <input type="text" id="nameInput" placeholder="Enter your name" class="input">
    </div>

    <div id="adminInput" class="selection-box hidden">
      <label>Admin Password</label>
      <input type="password" id="adminPassword" placeholder="Password" class="input">
    </div>

    <div style="margin-top:12px">
      <button id="loginBtn" class="btn">Continue →</button>
    </div>

    <p id="message" style="color:#d33;margin-top:12px;text-align:center"></p>
  </div>

  <script src="login.js"></script>
</body>
</html>
